version: '3.8'

services:
  backend:
    image: python:3.11-slim
    container_name: presence_ai_backend
    volumes:
      - ./backend:/backend
    working_dir: /backend
    ports:
      - "8099:8099"
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && 
             python populate_mock.py && 
             uvicorn main:app --host 0.0.0.0 --port 8099 --reload"
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PATH=/backend/presence_ai.db

  frontend:
    image: node:20-alpine
    container_name: presence_ai_frontend
    volumes:
      - ./frontend:/frontend
    working_dir: /frontend
    ports:
      - "5173:5173"
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
